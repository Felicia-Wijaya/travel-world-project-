<h1>Booking Sekarang</h1>

<p>
Silakan isi formulir di bawah untuk memesan paket wisata Anda.
</p>

<form>

<label>Nama Lengkap</label>
<input type="text" placeholder="Masukkan nama lengkap" required>

<label>Email</label>
<input type="email" placeholder="Masukkan email" required>

<label>No. Telepon</label>
<input type="tel" placeholder="Masukkan nomor telepon" required>

<label>Pilih Paket Wisata</label>

<select required>

<option value="">
-- Pilih Paket --
</option>

<option>
Bali Package
</option>

<option>
Jepang Package
</option>

<option>
Kamboja Package
</option>

<option>
Korea Package
</option>

<option>
Raja Ampat Package
</option>

<option>
Vietnam Package
</option>

</select>

<label>Tanggal Keberangkatan</label>
<input type="date" required>

<label>Jumlah Peserta</label>
<input type="number" min="1" placeholder="Jumlah peserta" required>

<label>Catatan Tambahan</label>

<textarea placeholder="Tambahkan catatan jika ada"></textarea>

<button class="submit-btn">
Kirim Booking
</button>

</form>
